openapi: 3.0.0
info:
  title: G7 Auto API
  description: Hệ thống quản lý showroom ô tô G7 Auto
  version: 1.0.0
servers:
  - url: http://localhost:8080
    description: Local server
paths:
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Đăng nhập
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh token
      responses:
        '200':
          description: OK
  /api/auth/me:
    get:
      tags: [Auth]
      summary: Lấy thông tin người dùng hiện tại
      responses:
        '200':
          description: OK
  /api/auth/init-superadmin:
    post:
      tags: [Auth]
      summary: Khởi tạo tài khoản SUPERADMIN
      responses:
        '200':
          description: OK

  /api/accounts:
    get:
      tags: [Account]
      summary: Tìm kiếm tài khoản
      responses:
        '200':
          description: OK
    post:
      tags: [Account]
      summary: Tạo tài khoản mới
      responses:
        '200':
          description: OK
  /api/accounts/{id}:
    get:
      tags: [Account]
      summary: Lấy chi tiết tài khoản
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
    put:
      tags: [Account]
      summary: Cập nhật tài khoản
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
    delete:
      tags: [Account]
      summary: Xóa tài khoản
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
  /api/accounts/{id}/change-status:
    post:
      tags: [Account]
      summary: Thay đổi trạng thái tài khoản
      parameters:
